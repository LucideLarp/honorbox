<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 344 88" role="img" aria-label="HonorBox">
  <style>
    .ink { stroke: #23201b; }
    .fill-ink { fill: #23201b; }
    .coin { fill: #b5482a; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #ece5d8; }
      .fill-ink { fill: #ece5d8; }
      .coin { fill: #d9603c; }
    }
  </style>
  <!-- mark: the insert-coin gesture — a tilted coin dropping toward the slot on the honor box -->
  <g transform="translate(8,8)">
    <rect x="9" y="31" width="54" height="33" rx="8" fill="none" class="ink" stroke-width="5"/>
    <rect x="22" y="27" width="28" height="7" rx="3.5" class="coin"/>
    <rect x="-3.5" y="-8" width="7" height="16" rx="3.5" class="coin" transform="translate(36 12) rotate(-22)"/>
  </g>
  <!-- wordmark -->
  <text x="94" y="64" font-family="Iowan Old Style, Palatino Nova, Palatino, Charter, Georgia, serif"
        font-size="42" font-weight="700" letter-spacing="-0.6" class="fill-ink">HonorBox</text>
</svg>
