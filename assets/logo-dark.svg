<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 68" width="320" height="68" role="img" aria-label="HonorBox">
  <!-- Mark plus wordmark, for dark backgrounds.
       The mark is the same geometry as the favicon and the avatar, scaled,
       never redrawn. The wordmark is Schibsted Grotesk 800 converted to
       outlines: as live text it rendered in a different fallback face on every
       machine without the font, which is most of them.
       Colours are fixed rather than media-query driven, because the README
       picks the file with <picture>. A media query here would follow the
       operating system while GitHub follows its own theme setting, and the two
       disagree often enough to make the logo vanish. -->
