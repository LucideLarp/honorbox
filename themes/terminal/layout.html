<!doctype html>
<html lang="{{lang}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>{{title}}</title>
<meta name="description" content="{{description}}">
<link rel="canonical" href="{{canonical}}">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="stylesheet" href="./style.css">
<meta property="og:title" content="{{title}}">
<meta property="og:description" content="{{description}}">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0a0f0a" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0a0f0a" media="(prefers-color-scheme: dark)">
</head>
<body class="{{body_class}}">
<header class="site-head">
  <a class="brand" href="./"><svg class="brand-mark" width="26" height="26" viewBox="0 0 48 48" aria-hidden="true"><path fill="currentColor" d="M9,15H39A3,3 0 0 1 42,18V42H6V18A3,3 0 0 1 9,15ZM4.5,39H43.5A1.5,1.5 0 0 1 45,40.5V43.5A1.5,1.5 0 0 1 43.5,45H4.5A1.5,1.5 0 0 1 3,43.5V40.5A1.5,1.5 0 0 1 4.5,39ZM18,24A3,3 0 0 0 15,27A3,3 0 0 0 18,30H30A3,3 0 0 0 33,27A3,3 0 0 0 30,24H18Z"/><path fill="var(--coin, currentColor)" d="M18.21,9.84A6.25,4.15 -22 0 1 29.79,5.16A6.25,4.15 -22 0 1 18.21,9.84Z"/></svg>{{store_name}}</a>
  <nav class="site-nav">{{nav}}</nav>
</header>
<main>
{{content}}
</main>
<footer class="site-foot">
  <p class="foot-links">{{footer}}</p>
  <p class="foot-legal">© {{year}} · {{seller}} · Payments by Stripe · Runs on <a href="https://github.com/Honorboxx/honorbox">HonorBox</a></p>
</footer>
</body>
</html>
