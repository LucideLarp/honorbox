<!doctype html>
<html lang="{{lang}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>{{title}}</title>
<meta name="description" content="{{description}}">
<link rel="canonical" href="{{canonical}}">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="stylesheet" href="./style.css">
<meta property="og:title" content="{{title}}">
<meta property="og:description" content="{{description}}">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0a0f0a" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0a0f0a" media="(prefers-color-scheme: dark)">
</head>
<body class="{{body_class}}">
<header class="site-head">
  <a class="brand" href="./"><svg class="brand-mark" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="7" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 11h18" stroke="currentColor" stroke-width="2"/><rect x="9" y="3" width="6" height="2.5" rx="1" fill="currentColor"/><rect x="9.5" y="14.5" width="5" height="2" rx="1" fill="var(--accent)" stroke="none"/></svg>{{store_name}}</a>
  <nav class="site-nav">{{nav}}</nav>
</header>
<main>
{{content}}
</main>
<footer class="site-foot">
  <p class="foot-links">{{footer}}</p>
  <p class="foot-legal">© {{year}} · {{seller}} · Payments by Stripe · Runs on <a href="https://github.com/Honorboxx/honorbox">HonorBox</a></p>
</footer>
</body>
</html>
